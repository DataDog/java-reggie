pluginManagement {
    def gradlePluginProxy = providers.gradleProperty('gradlePluginProxy').orNull
    repositories {
        if (gradlePluginProxy) {
            maven { url gradlePluginProxy }
        }
        gradlePluginPortal()
        mavenCentral()
    }
}

plugins {
    // Apply the foojay-resolver plugin to allow automatic download of JDKs
    id 'org.gradle.toolchains.foojay-resolver-convention' version '1.0.0'
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    def mavenRepositoryProxy = providers.gradleProperty('mavenRepositoryProxy').orNull
    repositories {
        if (mavenRepositoryProxy) {
            maven { url mavenRepositoryProxy }
        }
        mavenCentral()
    }
}

rootProject.name = 'reggie'
include('reggie-annotations')
include('reggie-codegen')
include('reggie-processor')
include('reggie-runtime')
include('reggie-benchmark')
include('reggie-integration-tests')
