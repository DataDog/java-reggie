# Codecov configuration for Reggie

coverage:
  precision: 1
  round: down
  range: "60...80"

  status:
    project:
      default:
        target: 70%
        threshold: 1%
        if_ci_failed: error

    patch:
      default:
        target: 70%
        threshold: 5%

comment:
  layout: "header, diff, files, footer"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

ignore:
  - "reggie-benchmark/**"
  - "**/testdata/**"
  - "**/corpus/**"
  - "**/debug/**"
  - "**/*Test.java"
  - "**/*Benchmark.java"
  # Debug-only diagnostic printer (every case is a System.out.println), already excluded from
  # our own jacocoVerify/jacocoAggregateReport gates (see build.gradle) — not meant to be
  # unit-tested.
  - "**/PatternDebugger.java"

github_checks:
  annotations: true
